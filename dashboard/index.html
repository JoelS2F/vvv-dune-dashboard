/* ── Constants ───────────────────────────────────────────────────── */

const SECTION_COLORS = { A: '#5B7553', B: '#8B6914', C: '#6B4226', D: '#4A5568' };
const SECTION_NAMES  = { A: 'STH-NUPL & Staking', B: 'Flow Analysis', C: 'Holder Structure', D: 'Venice/Migration' };

const REGIME_COLORS = {
  accumulate: '#5B7553', hold: '#8B6914', neutral: '#6B7280',
  reduce: '#B8572A', hedge: '#8B2500'
};

function classifyRegime(score) {
  if (score > 68) return 'accumulate';
  if (score > 55) return 'hold';
  if (score > 38) return 'neutral';
  if (score > 22) return 'reduce';
  return 'hedge';
}

const DUNE_MAP = {
  panel_1a: 6953031, panel_1b: 6953009, panel_1c: 6953035,
  panel_2a: 6953018, panel_2b: 6953223,
  panel_3: 6953042, panel_4: 6953185, panel_5: 6953189,
  panel_6: 6953202, panel_7: 6953047, panel_8: 6953054,
  panel_9a: 6953024, panel_9b: 6953215,

const WEIGHT_BARS = [
  { label: 'Staking Flow', pct: 15, color: SECTION_COLORS.A },
  { label: 'STH-NUPL', pct: 12, color: SECTION_COLORS.A },
  { label: 'CEX Inflow', pct: 12, color: SECTION_COLORS.B },

  { label: 'sVVV Ratio', pct: 10, color: SECTION_COLORS.A },
  { label: 'DEX Ratio', pct: 8, color: SECTION_COLORS.B },
  { label: 'Holder Bands', pct: 8, color: SECTION_COLORS.C },
  { label: 'Transfer Vol', pct: 7, color: SECTION_COLORS.C },
  { label: 'DIEM Mint', pct: 8, color: SECTION_COLORS.D },
  { label: 'Migration', pct: 10, color: SECTION_COLORS.D },
];

function buildMockData() {
  const now = new Date().toISOString();
  const panels = PANEL_META.map(m => ({
    panel_id: m.id + '_' + m.name.toLowerCase().replace(/[^a-z0-9]+/g, '_'),
    name: m.name,
    section: m.section,
    signal_type: m.signal_type,
    data_type: 'time_series',
    score: +(Math.random() * 100).toFixed(1),
    weight: +(Math.random() * 0.15).toFixed(3),
    n_events: Math.floor(Math.random() * 10),
    validated: Math.random() > 0.6,
    best_p_value: Math.random() > 0.5 ? +(Math.random() * 0.1).toFixed(4) : null,
    best_hit_rate: Math.random() > 0.5 ? +(50 + Math.random() * 40).toFixed(1) : null,
    best_window: Math.random() > 0.5 ? Math.floor(5 + Math.random() * 25) + 'd' : null,
    latest_signal: Math.random() > 0.4
      ? { direction: Math.random() > 0.5 ? 'bullish' : 'bearish', strength: +(Math.random()).toFixed(2), date: now }
      : null
  }));
  const sectionScores = {};
  ['A','B','C','D'].forEach(s => {
    const sp = panels.filter(p => p.section === s);
    sectionScores[s] = {
      composite: +(sp.reduce((a,p) => a + p.score, 0) / (sp.length || 1)).toFixed(1),
      n_panels: sp.length,
      n_active: sp.filter(p => p.n_events > 0).length
    };
  });
  const composite = +(panels.reduce((a,p) => a + p.score, 0) / panels.length).toFixed(2);
  return {
    schema_version: '1.0',
    generated_at: now,
    composite_score: composite,
    regime: classifyRegime(composite).toUpperCase(),
    sections: sectionScores,
    panels,
    backtest_summary: { total_events: panels.reduce((a,p) => a + p.n_events, 0), validated_panels: panels.filter(p => p.validated).length },
    _mock: true
  };
}

/* ── Helpers ──────────────────────────────────────────────────────── */

function duneUrl(panelId) {
  const shortId = panelId.replace(/_[a-z_]+$/, '').replace('panel_', 'panel_');
  // Try exact match first, then strip trailing descriptors
  for (const [key, qid] of Object.entries(DUNE_MAP)) {
    if (panelId.startsWith(key)) return `https://dune.com/queries/${qid}`;
  }
  return null;
}

function panelShortId(panelId) {
  for (const key of Object.keys(DUNE_MAP)) {
    if (panelId.startsWith(key)) return key;
  }
  return panelId;
}

function metaForPanel(panel) {
  for (const m of PANEL_META) {
    if (panel.panel_id && panel.panel_id.startsWith(m.id)) return m;
  }
  // fallback: match by name
  return PANEL_META.find(m => m.name === panel.name) || {};
}

function isStale(generatedAt) {
  if (!generatedAt) return true;
  return (Date.now() - new Date(generatedAt).getTime()) > 3600000;
}

function fmtTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

        {sections.map(s => (
          <button key={s.key} style={S.navBtn(sectionFilter === s.key)} onClick={() => setSectionFilter(s.key)}>

            {v}

function PanelCard({ panel }) {
  const meta = metaForPanel(panel);
  const sColor = SECTION_COLORS[panel.section] || '#4A5568';
  const regime = classifyRegime(panel.score || 0);
  const url = duneUrl(panel.panel_id || meta.id);

  return (
    <div
      style={S.card(sColor)}
      onClick={() => url && window.open(url, '_blank')}
      onMouseEnter={e => e.currentTarget.style.boxShadow = '0 3px 12px rgba(0,0,0,0.1)'}
      onMouseLeave={e => e.currentTarget.style.boxShadow = '0 1px 3px rgba(0,0,0,0.06)'}
    >
      <div style={S.cardId}>
        {panelShortId(panel.panel_id || meta.id)} &bull; {SECTION_NAMES[panel.section] || panel.section}
      </div>
      <div style={S.cardName}>{panel.name || meta.name}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={S.cardScore(regime)}>{panel.score != null ? panel.score.toFixed(1) : '--'}</span>
        <span style={S.miniPill(regime)}>{regime}</span>
      </div>
      <div style={S.cardMeta}>
        Lead: {meta.leadTime || '--'} &nbsp;&bull;&nbsp;
        Events: {panel.n_events ?? '--'} &nbsp;&bull;&nbsp;
        Type: {(panel.signal_type || meta.signal_type || '--')}
        {panel.latest_signal && (
          <span> &nbsp;&bull;&nbsp; Signal: <span style={{ color: panel.latest_signal.direction === 'bullish' ? '#5B7553' : '#B8572A', fontWeight: 700 }}>
            {panel.latest_signal.direction} ({panel.latest_signal.strength})
          </span></span>
        )}
      </div>
      <div style={S.cardHypo}>{meta.hypothesis || ''}</div>
    </div>
  );
}

function GridView({ panels, sectionFilter }) {
  const filtered = sectionFilter === 'all' ? panels : panels.filter(p => p.section === sectionFilter);

  const typeGroups = [
    { type: 'leading', label: 'Leading Signals', color: '#5B7553' },
    { type: 'coincident', label: 'Coincident Signals', color: '#8B6914' },
    { type: 'lagging', label: 'Lagging Signals', color: '#8A8474' },
  ];

  return (
    <div>
      {typeGroups.map(g => {
        const meta_lookup = (p) => metaForPanel(p);
        const items = filtered.filter(p => {
          const m = meta_lookup(p);
          return (p.signal_type || m.signal_type) === g.type;
        });
        if (items.length === 0) return null;
        return (
          <div key={g.type}>
            <div style={S.sectionGroupTitle(g.color)}>{g.label}</div>
            <div style={S.grid}>
              {items.map((p, i) => <PanelCard key={p.panel_id || i} panel={p} />)}
            </div>
          </div>
        );
      })}

      {sectionFilter === 'all' && <WeightBar />}
    </div>
  );
}

function ThesisView({ data }) {
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem('vvv-analyst-notes') || '[]'); } catch { return []; }
  });
  const [draft, setDraft] = useState('');
  const regime = (data.regime || 'neutral').toLowerCase();

  function addNote() {
    if (!draft.trim()) return;
    const entry = {
      text: draft.trim(),
      regime,
      score: data.composite_score,
      timestamp: new Date().toISOString()
    };
    const updated = [entry, ...notes].slice(0, 50);
    setNotes(updated);
    localStorage.setItem('vvv-analyst-notes', JSON.stringify(updated));
    setDraft('');
  }

  return (
    <div style={{ marginTop: 20, maxWidth: 800 }}>
      <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 18, color: '#2D2A24', marginBottom: 12 }}>
        Analyst Gate
      </div>
      <textarea
        style={S.textarea}
        placeholder="Log your thesis, observations, or trade rationale..."
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter' && e.ctrlKey) addNote(); }}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
        <span style={{ fontSize: 9, color: '#8A8474' }}>Ctrl+Enter to submit</span>
        <button style={S.btn('#2D2A24')} onClick={addNote}>Add Note</button>
      </div>

      <div style={{ marginTop: 24 }}>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: '#8A8474', textTransform: 'uppercase', marginBottom: 10 }}>
          Recent Notes ({Math.min(notes.length, 20)})
        </div>
        {notes.slice(0, 20).map((n, i) => (
          <div key={i} style={S.noteCard}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <span style={S.miniPill(n.regime || 'neutral')}>
                {n.regime || 'neutral'} &bull; {n.score != null ? n.score.toFixed(1) : '--'}
              </span>
              <span style={{ fontSize: 9, color: '#8A8474' }}>{fmtTime(n.timestamp)}</span>
            </div>
            <div style={{ fontSize: 12, lineHeight: 1.6, color: '#2D2A24', whiteSpace: 'pre-wrap' }}>
              {n.text}
            </div>
          </div>
        ))}
        {notes.length === 0 && (
          <div style={{ fontSize: 12, color: '#8A8474', fontStyle: 'italic' }}>No notes yet.</div>
        )}
      </div>
    </div>
  );
}

function Footer({ data, onRefresh, loading }) {
  const active = data.panels ? data.panels.filter(p => (p.n_events || 0) > 0).length : 0;
  const total = data.panels ? data.panels.length : 16;
  return (
    <div style={S.footer}>
      <div style={S.footerLabel}>
        {total} PANELS &bull; {active} RETURNING DATA
        {data._mock && <span style={{ color: '#B8572A', marginLeft: 8 }}>(MOCK DATA)</span>}
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <button style={S.btn('#5B7553')} onClick={onRefresh} disabled={loading}>
          {loading ? 'REFRESHING...' : 'REFRESH'}
        </button>
        <button style={S.btn('#2D2A24')} onClick={() => window.open('https://dune.com/joels2f', '_blank')}>
          OPEN DUNE
        </button>
      </div>
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────── */

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [sectionFilter, setSectionFilter] = useState('all');
  const [viewTab, setViewTab] = useState('Grid');
  const intervalRef = useRef(null);

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch('/api/vvv-signal');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      // Merge metadata: ensure each panel has section/signal_type from our meta
      if (json.panels) {
        json.panels = json.panels.map(p => {
          const m = metaForPanel(p);
          return {
            ...p,
            section: p.section || m.section,
            signal_type: p.signal_type || m.signal_type,
          };
        });
      }
      setData(json);
    } catch (err) {
      console.warn('Fetch failed, using mock data:', err.message);
      setData(buildMockData());
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchData();
    intervalRef.current = setInterval(fetchData, 300000); // 5 min
    return () => clearInterval(intervalRef.current);
  }, [fetchData]);

  if (!data) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', fontFamily: "'DM Serif Display', serif", fontSize: 20, color: '#8A8474' }}>
        Loading VVV Signal Intelligence...
      </div>
    );
  }

  // Build enriched panel list: if API returned panels use those, otherwise build from meta
  const panels = data.panels && data.panels.length > 0
    ? data.panels
    : PANEL_META.map(m => ({ panel_id: m.id, name: m.name, section: m.section, signal_type: m.signal_type, score: 0, n_events: 0 }));

  return (
    <div>
      <Header data={data} />
      <NavBar sectionFilter={sectionFilter} setSectionFilter={setSectionFilter} viewTab={viewTab} setViewTab={setViewTab} />
      <div style={S.body}>
        {viewTab === 'Grid' && <GridView panels={panels} sectionFilter={sectionFilter} />}
        {viewTab === 'Table' && <TableView panels={panels} sectionFilter={sectionFilter} />}
        {viewTab === 'Thesis' && <ThesisView data={data} />}
      </div>
      <Footer data={data} onRefresh={fetchData} loading={loading} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
